name: CI

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: swift-actions/setup-swift@v2
      - name: Install C++ Boost (headers + system runtime library)
        run: sudo apt-get update && sudo apt-get install -y libboost-dev libboost-system-dev
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew build
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
