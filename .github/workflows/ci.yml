name: CI

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
      - name: Install C++ Boost (headers + system runtime library)
        run: sudo apt-get update && sudo apt-get install -y libboost-dev libboost-system-dev
      - uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      - uses: gradle/actions/setup-gradle@v6.1.0
      - run: ./gradlew build
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
